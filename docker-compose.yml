services:
  mongo:
    image: mongo:7
    container_name: magis_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - magis_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    container_name: magis_app
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      PORT: "4000"
      MONGO_URI: "mongodb://mongo:27017/magis_gad"
      NODE_ENV: "production"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  magis_mongo_data:
